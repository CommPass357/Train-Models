name: Build UP80 Android v1.0.5

on:
  push:
    tags:
      - 'v1.0.5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Build debug APK
        run: gradle -p models/up-80-coal-turbine/v1.0.5-android-app/app-project :app:assembleDebug
      - name: Copy APK
        run: |
          mkdir -p dist
          cp models/up-80-coal-turbine/v1.0.5-android-app/app-project/app/build/outputs/apk/debug/app-debug.apk dist/up80-catalog-v1.0.5-debug.apk
      - name: Upload APK to release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          tag_name: v1.0.5
          name: v1.0.5 Android Update Notice
          files: dist/up80-catalog-v1.0.5-debug.apk
          make_latest: true
